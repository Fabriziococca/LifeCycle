<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hygiene Tracker | Sábanas y Toallas</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="description" content="Aplicación para hacer seguimiento al lavado de sábanas, toallas y esponjas.">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="container">
        <header class="app-header">
            <div class="header-title">
                <i class="ph-fill ph-drop"></i>
                <h1>Hygiene Tracker</h1>
            </div>
            <p class="subtitle">Mantén el control de tus lavados y mejora tu cuidado personal.</p>
        </header>

        <nav class="tabs-container" id="tabs-container">
            <button class="tab-btn active" data-category="todos">Todos</button>
            <button class="tab-btn" data-category="tecnologia">Tecnología</button>
            <button class="tab-btn" data-category="dormitorio_bano">Dormitorio & Baño</button>
            <button class="tab-btn" data-category="cuidado_personal">Cuidado Personal</button>
        </nav>

        <section class="cards-grid" id="tracker-container">
            <!-- Cards will be dynamically generated by JS -->
        </section>
    </main>

    <!-- Template for a tracker card -->
    <template id="card-template">
        <div class="card">
            <div class="card-header">
                <div class="icon-container">
                    <i class="card-icon"></i>
                </div>
                <div class="header-actions">
                    <button class="btn-info" title="Ver Instrucciones">
                        <i class="ph ph-book-open"></i>
                    </button>
                    <div class="status-indicator">
                        <span class="status-dot"></span>
                        <span class="status-text">OK</span>
                    </div>
                </div>
            </div>
            
            <div class="card-body">
                <h2 class="card-title">Item Name</h2>
                
                <div class="time-display">
                    <span class="days-count">0</span>
                    <span class="days-label">días</span>
                </div>
                
                <div class="date-info-container">
                    <div class="date-info">
                        <i class="ph ph-clock-counter-clockwise"></i>
                        <span><span class="last-date-label">Último lavado</span>: <strong class="last-date">Hoy</strong></span>
                    </div>
                    <div class="date-info">
                        <i class="ph ph-calendar"></i>
                        <span><span class="next-date-label">Próximo lavado</span>: <strong class="next-date">Mañana</strong></span>
                    </div>
                </div>

                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
            </div>

            <div class="instructions-collapse">
                <div class="instructions-content"></div>
            </div>

            <div class="card-footer">
                <button class="btn-wash">
                    <i class="ph-bold ph-waves"></i>
                    <span>Registrar Lavado</span>
                </button>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
